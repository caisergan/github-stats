<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Apply the persisted theme to <html> BEFORE first paint, so reloading in
      // dark mode doesn't flash the light default background. Mirrors getTheme()
      // in src/theme.ts (key "gs_theme", default "dark"). Must stay a classic,
      // synchronous script (no type=module / defer) so it runs during head parse.
      (function () {
        try {
          var t = localStorage.getItem("gs_theme");
          document.documentElement.setAttribute(
            "data-theme",
            t === "light" ? "light" : "dark"
          );
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <style>
      /* Critical, render-blocking-free background so the FIRST frame is already
         themed — before the main stylesheet applies (in dev it's JS-injected, so
         there's a gap where var(--bg) is undefined and the page would flash
         white). Hardcoded to the --bg tokens (zinc-950 / zinc-50) and keyed off
         data-theme so a runtime theme toggle stays correct. Keep in sync with
         the --bg values in src/styles.css. */
      html { background: #fafafa; }
      html[data-theme="dark"] { background: #09090b; color-scheme: dark; }
      html[data-theme="light"] { background: #fafafa; color-scheme: light; }
    </style>
